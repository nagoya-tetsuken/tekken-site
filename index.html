<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道研究部 ポータルサイト</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #fcfcfc;
        }

        header {
            width: 100%;
            line-height: 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 路線図メニューエリア --- */
        .navigation-section {
            background-color: #fff;
            padding: 40px 0; /* テキスト用に上の余白を少し広げました */
            border-bottom: 2px solid #eee;
        }

        .route-map-container {
            position: relative;
            width: 95%;
            max-width: 1000px;
            margin: 0 auto;
            line-height: 0;
        }

        .route-base-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 透過ボタンとテキストを包むグループ */
        .station-group {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 12%; /* ボタンの横幅 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ボタンの上のテキスト設定 */
        .station-label {
            position: absolute;
            bottom: 120%; /* ボタンの少し上に配置 */
            width: max-content;
            font-size: 0.75rem;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
            background-color: rgba(255,255,255,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none; /* テキストがクリックの邪魔をしないように */
        }

        .station-link {
            width: 100%;
            display: block;
            transition: filter 0.2s, transform 0.1s;
            line-height: 0;
        }

        .station-link img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ホバー時に「明るさ」を変える設定 */
        .station-link:hover {
            filter: brightness(1.3); /* 1.3倍明るくする */
        }

        .station-link:active {
            transform: scale(0.9);
        }

        /* 各ボタンの横位置（前回の調整ベース） */
        .pos-01 { left: 4%; }
        .pos-02 { left: 24.5%; }
        .pos-03 { left: 45%; }
        .pos-04 { left: 65.5%; }
        .pos-05 { left: 86%; }

        /* --- メインコンテンツ --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        section {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        h2 {
            border-left: 5px solid #e67e22;
            padding-left: 15px;
            margin-top: 0;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<header>
    <img src="header-img.png" alt="鉄研ヘッダー">
</header>

<nav class="navigation-section">
    <div class="route-map-container">
        <img src="menu-image.png" alt="路線図ベース" class="route-base-img">
        
        <div class="station-group pos-01">
            <span class="station-label">部活動について</span>
            <a href="#" class="station-link"><img src="description.png" alt="部活概要"></a>
        </div>

        <div class="station-group pos-02">
            <span class="station-label">お知らせ</span>
            <a href="#" class="station-link"><img src="notification.png" alt="お知らせ"></a>
        </div>

        <div class="station-group pos-03">
            <span class="station-label">活動紹介</span>
            <a href="#" class="station-link"><img src="activities.png" alt="活動紹介"></a>
        </div>

        <div class="station-group pos-04">
            <span class="station-label">作品紹介</span>
            <a href="#" class="station-link"><img src="media.png" alt="製作作品"></a>
        </div>

        <div class="station-group pos-05">
            <span class="station-label">ジオラマ運転体験</span>
            <a href="monitor.html" class="station-link"><img src="N-gage.png" alt="運転体験"></a>
        </div>
    </div>
</nav>

<main class="container">
    <section>
        <h2>最新の運行情報</h2>
        <p>ポータルサイトを公開しました。上の路線図から各項目を選択してください。</p>
    </section>
</main>

</body>
</html>
