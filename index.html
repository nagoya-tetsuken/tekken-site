<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイズ確認用 - ヘッダー検証</title>
    <style>
        body {
            margin: 0;
            /* 1. ヘッダーの高さ(100px) + 余白(20px) = 120px */
            padding-top: 120px; 
            font-family: sans-serif;
            background-color: #f0f0f0;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            /* 2. ヘッダーの高さ：100pxに設定 */
            height: 100px; 
            
            /* サイズが分かりやすいようにガイドを表示 */
            background-color: #2c3e50;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px; /* 20pxごとの方眼 */
            
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            color: #fff;
        }

        header::after {
            content: "Header Height: 100px (20px per grid)";
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 2px 10px;
            border-radius: 4px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            min-height: 200vh; /* スクロールさせるための高さ */
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .info-box {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    </header>

<main class="container">
    <div class="info-box">
        <p>↓ スクロールしてみてください ↓</p>
        <p>ヘッダーは固定されています。</p>
        <div style="height: 500px;"></div>
        <p>スクロールしてもヘッダーは消えません。</p>
        <div style="height: 500px;"></div>
        <p>一番下です。</p>
    </div>
</main>

</body>
</html>
