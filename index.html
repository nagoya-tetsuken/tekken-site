<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道研究部 ポータルサイト</title>
    <style>
        /* --- 基本設定 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #fcfcfc;
            color: #333;
        }

        header {
            width: 100%;
            line-height: 0;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 横並びメニュー（画面に収める） --- */
        .navigation-section {
            background-color: #fff;
            padding: 15px 10px;
            border-bottom: 2px solid #eee;
        }

        .route-map-wrapper {
            display: flex;
            justify-content: space-around; /* ボタンを均等に配置 */
            align-items: center;
            max-width: 800px; /* PCで見ても広がりすぎないように制限 */
            margin: 0 auto;
        }

        /* 各ボタンの設定 */
        .station-link {
            display: block;
            width: 18%; /* 5つ並べて少し余白が残るサイズ */
            transition: transform 0.1s;
        }

        .station-link img {
            width: 100%; /* 親要素の18%に合わせる */
            height: auto;
            display: block;
        }

        .station-link:active {
            transform: scale(0.9);
        }

        /* --- メインコンテンツ --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        section {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 {
            border-left: 5px solid #e67e22;
            padding-left: 15px;
            margin-top: 0;
            font-size: 1.2rem;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <img src="header-img.png" alt="鉄研ヘッダー">
</header>

<nav class="navigation-section">
    <div class="route-map-wrapper">
        <a href="#" class="station-link"><img src="description.png" alt="部活概要"></a>
        <a href="#" class="station-link"><img src="notification.png" alt="お知らせ"></a>
        <a href="#" class="station-link"><img src="activities.png" alt="活動紹介"></a>
        <a href="#" class="station-link"><img src="media.png" alt="製作作品"></a>
        <a href="monitor.html" class="station-link"><img src="N-gage.png" alt="運転体験"></a>
    </div>
</nav>

<main class="container">
    <section>
        <h2>最新の運行情報</h2>
        <p>ポータルサイトを公開しました。各ボタンから詳細をご覧いただけます。</p>
    </section>
</main>

<div class="footer">
    &copy; 名古屋中学校・高等学校 鉄道研究部
</div>

</body>
</html>
