<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nゲージ運行状況モニター</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ローディングオーバーレイのスタイル */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #4CAF50; /* 鉄道らしい緑色 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease; /* 消える時のアニメーション */
        }

        .train-track {
            width: 200px;
            height: 2px;
            background: #eee;
            position: relative;
            margin-top: 20px;
        }

        .mini-train {
            font-size: 40px;
            position: absolute;
            bottom: 0;
            animation: train-move 2s infinite linear;
        }

        .loading-msg {
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        @keyframes train-move {
            0% { left: -50px; }
            100% { left: 200px; }
        }

        /* フェードアウト用のクラス */
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="viewer-mode">

    <div id="loading-overlay">
        <div class="mini-train">🚃</div>
        <div class="train-track"></div>
        <div class="loading-msg">通信中...</div>
    </div>

    <nav class="top-nav">
        <button onclick="location.href='entry.html'" class="btn-entry">
            <span>🎫</span> 新規 整理券発行
        </button>
        <button id="resume-btn" class="btn-entry" style="display:none; background: #2c3e50; box-shadow: 0 4px 0 #1a252f; margin-left: 10px;">
            <span>📄</span> 自分の整理券を再表示
        </button>
    </nav>

    <main class="monitor-container">
        <div class="lcd-panel">
            <div class="lcd-header">
                <span class="lcd-label">STATUS</span>
                <span class="lcd-main-title">ただいまの呼出番号</span>
            </div>
            
            <div id="calling-now" class="lcd-number">
                WAIT...
            </div>
            
            <div class="lcd-footer">
                <marquee scrollamount="5">【鉄道研究部】 整理券番号が呼ばれましたら、受付までお越しください。 ジオラマの安全運転にご協力をお願いします。</marquee>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">待ち組数</div>
                <div class="value"><span id="wait-count">0</span> <small>組</small></div>
            </div>
            <div class="status-card">
                <div class="label">推定待ち時間</div>
                <div class="value"><span id="wait-time">0</span> <small>分</small></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    
    <script>
        // 1. 履歴ボタンの表示（これは即座に実行）
        function initResumeButton() {
            const savedId = localStorage.getItem('my_ticket_id');
            const savedV = localStorage.getItem('my_ticket_v');
            if (savedId && savedV) {
                const btn = document.getElementById('resume-btn');
                btn.style.display = 'inline-block';
                btn.onclick = () => {
                    location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(savedV)}`;
                };
            }
        }

        // 2. 履歴の有効チェック（データ取得後に実行）
        function checkTicketValidity(data) {
            const savedId = localStorage.getItem('my_ticket_id');
            if (!savedId || data.length === 0) return;

            const myTicket = data.find(d => d.id === savedId);
            if (!myTicket || myTicket.status === 'end') {
                localStorage.removeItem('my_ticket_id');
                localStorage.removeItem('my_ticket_v');
                document.getElementById('resume-btn').style.display = 'none';
            }
        }

        // 3. 画面の更新とオーバーレイの消去
        async function updateDisplay() {
            try {
                // GASからデータ取得
                const data = await fetchSheetData();
                
                // オーバーレイを消す
                const overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.classList.add('fade-out');
                    setTimeout(() => overlay.remove(), 800);
                }

                // 履歴チェック
                checkTicketValidity(data);

                // 呼出番号表示
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                const callingDisplay = document.getElementById('calling-now');
                if (callingIds.length > 0) {
                    callingDisplay.innerText = callingIds.join(' / ');
                } else {
                    callingDisplay.innerText = "お待ちください";
                }

                // 待ち情報表示
                const waitingCount = data.filter(d => d.status === 'resep').length;
                document.getElementById('wait-count').innerText = waitingCount;
                document.getElementById('wait-time').innerText = waitingCount * 5;

            } catch (e) {
                console.error("更新エラー:", e);
                // エラーでも一応オーバーレイは消して操作可能にする
                const overlay = document.getElementById('loading-overlay');
                if (overlay) overlay.remove();
            }
        }

        // 起動実行
        initResumeButton();
        updateDisplay();
        setInterval(updateDisplay, 10000); // 10秒おきに最新情報へ
    </script>
</body>
</html>
