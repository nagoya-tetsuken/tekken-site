<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFF ONLY - 運行管理</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 無骨なUIのための基本設定 */
        body { background: #222; color: #ddd; font-family: monospace; margin: 0; }
        .staff-container { max-width: 800px; margin: 0 auto; padding: 10px; }
        
        .section { border: 1px solid #444; margin-bottom: 20px; background: #000; padding: 15px; }
        .section-title { background: #444; color: #fff; padding: 5px 10px; font-size: 0.9rem; margin: -15px -15px 15px -15px; }

        .issue-form { display: flex; flex-wrap: wrap; gap: 10px; }
        select, button, input { border: 1px solid #666; background: #333; color: #fff; padding: 10px; border-radius: 0 !important; font-size: 1rem; }
        button { cursor: pointer; text-transform: uppercase; }
        button:active { background: #555; }
        
        /* ボタン色設定 */
        .btn-call { background: #800; }    /* 呼出 */
        .btn-end { background: #444; }     /* 終了 */
        .btn-re-call { background: #004488; } /* 再呼出用 */

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .admin-table th, .admin-table td { border: 1px solid #444; padding: 8px; text-align: left; }
        .admin-table th { background: #111; font-size: 0.8rem; }
        
        /* 行の状態別スタイル */
        .row-calling { background: #221100; color: #ff9900; font-weight: bold; }
        .row-ended { color: #666; } /* 終了分は少し暗く */

        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid #f1c40f; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        .loading-text { color: #f1c40f; font-size: 1.5rem; font-weight: bold; animation: blink 1s step-end infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="staff-mode">

<div class="staff-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span style="font-weight: bold;">[ SYSTEM TERMINAL - STAFF ONLY ]</span>
        <button onclick="location.href='monitor.html'" style="font-size: 0.7rem;">EXIT</button>
    </div>

    <div class="section">
        <div class="section-title">QUICK ISSUE (新規発行)</div>
        <div class="issue-form">
            <select id="v-select">
                <option value="">車両リスト読込中...</option>
            </select>
            <select id="t-select">
                <option value="S">特別(S)</option>
                <option value="A">普通(A)</option>
            </select>
            <button id="issue-btn" onclick="staffIssue()" style="background: #004400;">発行実行</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">ALL DATA LIST (全履歴・呼出管理)</div>
        <div id="list-container">
            </div>
    </div>
</div>

<div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Communicating...</div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

    async function loadMaster() {
        try {
            const response = await fetch(`${API_URL}?sheet=master`);
            const data = await response.json();
            const select = document.getElementById('v-select');
            if (data.vehicles) {
                select.innerHTML = '';
                data.vehicles.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v; opt.textContent = v;
                    select.appendChild(opt);
                });
            }
        } catch (e) { console.error(e); }
    }

    async function staffIssue() {
        const v = document.getElementById('v-select').value;
        const t = document.getElementById('t-select').value;
        if(!v) return;
        showLoading(true);
        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: 'issue', type: t, vehicle: v })
            });
            refresh();
        } catch (e) { alert("ERROR"); }
        showLoading(false);
    }

    async function refresh() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const container = document.getElementById('list-container');
            
            // フィルターを解除し、新しい順に並べる（任意）
            const allData = data.reverse(); 

            let html = `<table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>車両</th>
                        <th>状態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>`;

            allData.forEach(d => {
                let statusText = "-";
                let rowClass = "";
                let actionBtn = "";

                if (d.status === 'call') {
                    statusText = "CALLING";
                    rowClass = "row-calling";
                    actionBtn = `<button class="btn-end" onclick="upd('${d.id}', 'end')">終了</button>`;
                } else if (d.status === 'end') {
                    statusText = "ENDED";
                    rowClass = "row-ended";
                    actionBtn = `<button class="btn-re-call" onclick="upd('${d.id}', 'call')">再呼出</button>`;
                } else {
                    statusText = "WAITING";
                    actionBtn = `<button class="btn-call" onclick="upd('${d.id}', 'call')">呼出</button>`;
                }

                html += `<tr class="${rowClass}">
                    <td>${d.id}</td>
                    <td>${d.vehicle}</td>
                    <td>${statusText}</td>
                    <td>${actionBtn}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = allData.length ? html : "NO DATA";
        } catch (e) { console.error(e); }
    }

    async function upd(id, s) {
        showLoading(true);
        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: 'update', id: id, status: s })
            });
            refresh();
        } catch (e) { alert("ERROR"); }
        showLoading(false);
    }

    function showLoading(show) {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }

    window.addEventListener('load', () => {
        loadMaster();
        refresh();
    });

    setInterval(refresh, 10000);
</script>
</body>
</html>
