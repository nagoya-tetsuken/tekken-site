<h2>整理券発行</h2>
<select id="v-select">
    <option value="E5系">E5系 はやぶさ</option>
    <option value="E235系">E235系 山手線</option>
</select>
<button onclick="issue('S')">特別(S)発行</button>
<button onclick="issue('A')">普通(A)発行</button>

<hr>
<h2>呼出管理</h2>
<div id="admin-list"></div>

<script>
async function issue(type) {
    const v = document.getElementById('v-select').value;
    const id = prompt("番号を入力 (例: 005S)"); // 本来は自動採番ですが一旦手動でテスト
    if(!id) return;
    
    await sendData({ action: 'issue', id: id, type: type, vehicle: v });
    alert("発行しました！");
    location.reload();
}

async function renderAdmin() {
    const data = await getData();
    const list = document.getElementById('admin-list');
    list.innerHTML = data.filter(d => d.status !== 'end').map(d => `
        <div>
            ${d.id} [${d.status}] 
            <button onclick="update('${d.id}', 'call')">呼出</button>
            <button onclick="update('${d.id}', 'end')">終了</button>
        </div>
    `).join('');
}

async function update(id, status) {
    await sendData({ action: 'update', id: id, status: status });
    alert("更新しました");
    renderAdmin();
}
renderAdmin();
</script>
