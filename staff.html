<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スタッフ管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><button onclick="location.href='index.html'">トップへ戻る</button></nav>

    <section>
        <h2>🎫 新規発行</h2>
        <select id="vehicle-select">
            <option value="E5系 はやぶさ">E5系 はやぶさ</option>
            <option value="E235系 山手線">E235系 山手線</option>
        </select>
        <button onclick="issue('S')" style="background: orange;">特別(S)発行</button>
        <button onclick="issue('A')" style="background: lightblue;">普通(A)発行</button>
    </section>

    <hr>

    <section>
        <h2>📋 呼出管理</h2>
        <div id="admin-list"></div>
    </section>

    <script src="script.js"></script>
    <script>
        async function issue(type) {
            const data = await fetchSheetData();
            const newId = generateNextID(data, type);
            const v = document.getElementById('vehicle-select').value;
            
            await postToSheet({ action: 'issue', id: newId, type: type, vehicle: v });
            alert("発行完了: " + newId);
            location.href = `issued.html?id=${newId}`;
        }

        async function refreshList() {
            const data = await fetchSheetData();
            const list = document.getElementById('admin-list');
            list.innerHTML = data.filter(d => d.status !== 'end').map(d => `
                <div style="border: 1px solid #ccc; margin: 5px; padding: 10px;">
                    <strong>${d.id}</strong> (${d.vehicle}) [${d.status}]
                    <button onclick="changeStatus('${d.id}', 'call')">呼出</button>
                    <button onclick="changeStatus('${d.id}', 'end')">終了</button>
                </div>
            `).join('');
        }

        async function changeStatus(id, status) {
            await postToSheet({ action: 'update', id: id, status: status });
            refreshList();
        }
        refreshList();
    </script>
</body>
</html>
