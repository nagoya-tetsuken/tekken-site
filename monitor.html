<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄研模型特設サイト</title>
    <style>
        body {
            background-color: #ffffff;
            color: #333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* ⚙管理ボタン */
        .admin-link {
            position: absolute;
            top: 15px;
            right: 20px;
            text-decoration: none;
            color: #666;
            border: 1px solid #ccc;
            padding: 5px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            background: #fff;
            z-index: 100;
        }

        /* 発車標本体 */
        .lcd-board {
            width: 95vw;
            max-width: 1000px;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            overflow: hidden;
            margin-top: 60px;
        }

        /* 上部グレーエリア（網掛けなし） */
        .lcd-upper-gray {
            background: #3c3f41;
            padding: 25px 35px;
            display: flex;
            align-items: baseline;
            gap: 15px;
            border-bottom: 3px solid #000;
        }
        .lcd-upper-gray .main-jp { font-size: 2.4rem; font-weight: bold; color: #fff; }
        .lcd-upper-gray .sub-en { font-size: 1.2rem; color: #bbb; }

        /* LED表示エリア本体 */
        .led-inner-container {
            position: relative;
            background: #111; /* 真っ黒より少し明るくして網を見えやすく */
            overflow: hidden;
        }

        /* 網掛け：サイズを50pxに拡大し、文字の背後に配置 */
        .led-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('amikake.png');
            background-repeat: repeat;
            background-size: 50px; /* ご指定の50px */
            pointer-events: none;
            z-index: 1; /* 文字より後ろに */
            opacity: 0.5;
        }

        /* コンテンツレイヤー：網より前に出す */
        .led-content {
            position: relative;
            z-index: 5; /* 網(z-index:1)より前に */
        }

        .lcd-header {
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .h-col { font-size: 0.95rem; color: #888; text-align: center; font-weight: bold; }

        .lcd-main-row {
            display: flex;
            height: 140px;
            align-items: center;
            padding: 0 10px;
        }

        /* LED文字共通：強力な光彩（text-shadow）で視認性確保 */
        .led-text {
            font-weight: bold;
            line-height: 1;
        }

        .col-type { width: 20%; display: flex; justify-content: center; }
        .type-box { 
            font-size: 2.5rem; 
            color: #ff9d00; 
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ff9d00, 0 0 5px #fff; 
        }

        .col-wait { width: 20%; font-size: 3.8rem; color: #ff9d00; text-align: center; text-shadow: 0 0 15px #ff9d00; }
        .col-time { width: 20%; font-size: 3.8rem; text-align: center; }
        .col-id   { width: 40%; font-size: 4.8rem; color: #ff9d00; text-align: center; font-family: 'Consolas', monospace; text-shadow: 0 0 20px #ff9d00; }

        /* 待ち時間の色設定 */
        .time-normal { color: #33ff33; text-shadow: 0 0 15px #33ff33, 0 0 5px #fff; }
        .time-crowded { color: #ff9d00; text-shadow: 0 0 15px #ff9d00, 0 0 5px #fff; }
        .time-heavy { color: #ff3300; text-shadow: 0 0 15px #ff3300, 0 0 5px #fff; }

        .lcd-footer {
            height: 70px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.8);
            border-top: 2px solid #222;
        }
        marquee { font-size: 2rem; color: #ff9d00; font-weight: bold; text-shadow: 0 0 10px #ff9d00; }

        .btn-issue {
            margin-top: 50px;
            display: block;
            width: 340px;
            padding: 22px;
            background: #008542;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            box-shadow: 0 8px 25px rgba(0,133,66,0.4);
            transition: 0.2s;
        }
        .btn-issue:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <a href="staff.html" class="admin-link">⚙管理</a>

    <div class="lcd-board">
        <div class="lcd-upper-gray">
            <span class="main-jp">今度の発車は</span>
            <span class="sub-en">Next Train</span>
        </div>

        <div class="led-inner-container">
            <div class="led-mask"></div>

            <div class="led-content">
                <div class="lcd-header">
                    <div class="h-col" style="width: 20%;">種別</div>
                    <div class="h-col" style="width: 20%;">待ち組数</div>
                    <div class="h-col" style="width: 20%;">目安時間</div>
                    <div class="h-col" style="width: 40%;">ただいまの呼出番号</div>
                </div>

                <div class="lcd-main-row">
                    <div class="col-type"><div class="led-text type-box">体験</div></div>
                    <div class="col-wait led-text"><span id="wait-count">0</span><small style="font-size:1.2rem;">組</small></div>
                    <div class="col-time led-text" id="time-display"><span id="wait-time">0</span><small style="font-size:1.2rem;">分</small></div>
                    <div class="col-id led-text" id="calling-now">---</div>
                </div>

                <div class="lcd-footer">
                    <marquee id="telop-text" scrollamount="12">運行情報を取得中...</marquee>
                </div>
            </div>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const waitList = data.filter(d => d.status === 'resep');
                const count = waitList.length;
                const minutes = count * 5;

                document.getElementById('wait-count').innerText = count;
                document.getElementById('wait-time').innerText = minutes;

                const timeEl = document.getElementById('time-display');
                timeEl.classList.remove('time-normal', 'time-crowded', 'time-heavy');
                if (minutes >= 30) timeEl.classList.add('time-heavy');
                else if (minutes >= 15) timeEl.classList.add('time-crowded');
                else timeEl.classList.add('time-normal');

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";

                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;
            } catch (e) { console.error(e); }
        }
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
