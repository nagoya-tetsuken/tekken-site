<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nゲージ運行状況モニター</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ロード中の文字を目立たせるスタイル */
        .loading-text {
            color: #ffcc00 !important;
            font-size: 3rem !important;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- スタッフ用ログインモーダル --- */
        #login-modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .login-box {
            background: #1a1a1a; border: 2px solid #f1c40f;
            padding: 30px; border-radius: 8px; text-align: center;
        }
        .login-box h2 { color: #f1c40f; font-size: 1.2rem; margin-bottom: 20px; }
        .login-box input {
            background: #000; border: 1px solid #444; color: #2ecc71;
            padding: 10px; width: 180px; font-size: 1.2rem; text-align: center;
            margin-bottom: 20px; outline: none;
        }
        .btn-auth { background: #2ecc71; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-cancel { background: #555; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }

        /* --- 処理中オーバーレイ --- */
        #loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            z-index: 10000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .sync-text {
            color: #f1c40f; font-size: 1.5rem; letter-spacing: 5px;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body class="viewer-mode">

    <nav class="top-nav" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <button onclick="location.href='entry.html'" class="btn-entry">
                <span>🎫</span> 新規 整理券発行
            </button>
            <button id="resume-btn" class="btn-entry" style="display:none; background: #2c3e50; box-shadow: 0 4px 0 #1a252f; margin-left: 10px;">
                <span>📄</span> 自分の再表示
            </button>
        </div>
        <button onclick="openStaffLogin()" style="background:none; border:none; color:#bbb; cursor:pointer; font-size:0.8rem;">
            ⚙️ 管理
        </button>
    </nav>

    <main class="monitor-container">
        <div class="lcd-panel">
            <div class="lcd-header">
                <span class="lcd-label">STATUS</span>
                <span class="lcd-main-title">ただいまの呼出番号</span>
            </div>
            
            <div id="calling-now" class="lcd-number loading-text">
                LOADING...
            </div>
            
            <div class="lcd-footer">
                <marquee scrollamount="5">【鉄道研究部】 整理券番号が呼ばれましたら、受付までお越しください。 ジオラマの安全運転にご協力をお願いします。</marquee>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="label">待ち組数</div>
                <div class="value"><span id="wait-count">0</span> <small>組</small></div>
            </div>
            <div class="status-card">
                <div class="label">推定待ち時間</div>
                <div class="value"><span id="wait-time">0</span> <small>分</small></div>
            </div>
        </div>
    </main>

    <div id="login-modal">
        <div class="login-box">
            <h2>STAFF ONLY / 認証</h2>
            <input type="password" id="pass-input" placeholder="****">
            <div style="display: flex; justify-content: center;">
                <button class="btn-auth" onclick="verifyPassword()">ログイン</button>
                <button class="btn-cancel" onclick="closeStaffLogin()">キャンセル</button>
            </div>
            <p id="error-msg" style="color: #e74c3c; margin-top: 15px; font-size: 0.8rem; visibility: hidden;">パスワードが違います</p>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="sync-text">COMMUNICATING...</div>
        <div style="color: #666; margin-top: 10px; font-size: 0.8rem;">Accessing Staff Panel</div>
    </div>

    <script src="script.js"></script>
    
    <script>
        // --- スタッフログイン制御 ---
        function openStaffLogin() {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('pass-input').focus();
        }

        function closeStaffLogin() {
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('pass-input').value = '';
            document.getElementById('error-msg').style.visibility = 'hidden';
        }

        async function verifyPassword() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "1234") { // パスワードはここで設定
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'flex';
                
                // 演出のための待機（1.2秒）
                await new Promise(resolve => setTimeout(resolve, 1200));
                location.href = 'staff.html';
            } else {
                document.getElementById('error-msg').style.visibility = 'visible';
                document.getElementById('pass-input').value = '';
            }
        }

        // --- 以下、既存のロジック ---
        function manageResumeButton(data) {
            const savedId = localStorage.getItem('my_ticket_id');
            const resumeBtn = document.getElementById('resume-btn');
            
            if (!savedId) {
                resumeBtn.style.display = 'none';
                return;
            }

            const myTicket = data.find(d => d.id === savedId);
            
            if (myTicket && myTicket.status !== 'end') {
                resumeBtn.style.display = 'inline-block';
                resumeBtn.onclick = () => {
                    location.href = `issued.html?id=${savedId}&v=${encodeURIComponent(localStorage.getItem('my_ticket_v'))}`;
                };
            } else {
                localStorage.removeItem('my_ticket_id');
                localStorage.removeItem('my_ticket_v');
                resumeBtn.style.display = 'none';
            }
        }

        async function updateDisplay() {
            try {
                const data = await fetchSheetData();
                const callingDisplay = document.getElementById('calling-now');
                callingDisplay.classList.remove('loading-text');

                manageResumeButton(data);

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                callingDisplay.innerText = callingIds.length > 0 ? callingIds.join(' / ') : "お待ちください";

                const waitingCount = data.filter(d => d.status === 'resep').length;
                document.getElementById('wait-count').innerText = waitingCount;
                document.getElementById('wait-time').innerText = waitingCount * 5;

            } catch (e) {
                console.error("更新エラー:", e);
            }
        }

        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
