<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運行情報表示器 - N-Scale Station</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        /* 外枠：筐体 */
        .display-case {
            width: 95vw;
            max-width: 900px;
            background: #222;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            padding-bottom: 10px;
        }

        /* 筐体上部のグリーンライン */
        .line-accent {
            height: 30px;
            background: #008542; /* 南海グリーン風 */
            margin-top: 40px;
            width: 100%;
        }

        /* 右上の番線表示風ボックス */
        .platform-number {
            position: absolute;
            top: 10px;
            right: 20px;
            background: #555;
            color: #ccc;
            width: 60px;
            height: 60px;
            text-align: center;
            line-height: 60px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* 1段目：フラップ表示部 */
        .flap-area {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #111;
        }

        .col { display: flex; flex-direction: column; align-items: center; }
        .label-en { font-size: 0.6rem; color: #888; margin-top: 2px; }
        .label-jp { font-size: 1rem; color: #ff3333; font-weight: bold; margin-bottom: 5px; } /* 先発風の赤文字 */

        /* フラップデザイン */
        .flap-container { display: flex; gap: 3px; }
        .flap {
            background: #1a1a1a;
            color: #ddd;
            width: 50px;
            height: 80px;
            line-height: 80px;
            text-align: center;
            font-size: 3.5rem;
            font-weight: bold;
            border-radius: 4px;
            position: relative;
            background-image: linear-gradient(to bottom, #222 49%, #000 50%, #222 51%);
        }
        .flip { animation: flap-anim 0.3s ease-in; }
        @keyframes flap-anim { 
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(90deg); background: #333; }
            100% { transform: rotateX(0deg); }
        }

        /* 2段目：LEDテロップ */
        .led-area {
            background: #000;
            margin: 10px 20px;
            height: 60px;
            display: flex;
            align-items: center;
            border: 2px solid #333;
        }
        marquee { font-size: 1.8rem; color: #ff8000; font-weight: bold; }

        /* 整理券発行ボタン */
        .btn-issue {
            margin-top: 40px;
            width: 80%;
            max-width: 500px;
            padding: 20px;
            background: #008542;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #005a2d;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .btn-issue:active { transform: translateY(3px); box-shadow: none; }

        /* 小さな管理ボタン */
        .btn-staff {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #aaa;
            text-decoration: none;
            border: 1px solid #ddd;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <div class="display-case">
        <div class="platform-number">4</div>
        <div class="line-accent"></div>
        
        <div class="flap-area">
            <div class="col">
                <div class="label-jp">待ち組数</div>
                <div class="flap-container" id="wait-count-container">
                    <div class="flap">0</div><div class="flap">0</div>
                </div>
                <div class="label-en">Waiting List</div>
            </div>
            <div class="col">
                <div class="label-jp">待ち時間</div>
                <div class="flap-container" id="wait-time-container">
                    <div class="flap">0</div><div class="flap">0</div>
                </div>
                <div class="label-en">Est. Time</div>
            </div>
            <div class="col">
                <div class="label-jp">呼出中</div>
                <div class="flap-container" id="calling-container">
                    <div class="flap">-</div><div class="flap">-</div><div class="flap">-</div><div class="flap">-</div>
                </div>
                <div class="label-en">Now Calling</div>
            </div>
        </div>

        <div class="led-area">
            <marquee id="telop-text" scrollamount="8">運行システム接続中...</marquee>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する<br><span style="font-size: 0.9rem; font-weight: normal;">Get Your Ticket Here</span></a>

    <a href="staff.html" class="btn-staff">SYSTEM MANAGEMENT</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        function updateFlaps(containerId, newValue) {
            const container = document.getElementById(containerId);
            const flaps = container.querySelectorAll('.flap');
            const newChars = newValue.toString().padStart(flaps.length, '0').split('');

            newChars.forEach((char, i) => {
                if (flaps[i] && flaps[i].innerText !== char) {
                    flaps[i].classList.remove('flip');
                    void flaps[i].offsetWidth;
                    flaps[i].innerText = char;
                    flaps[i].classList.add('flip');
                }
            });
        }

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                const waitCount = data.filter(d => d.status === 'resep').length;
                updateFlaps('wait-count-container', waitCount);
                updateFlaps('wait-time-container', waitCount * 5);

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                const latestCall = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "----";
                updateFlaps('calling-container', latestCall);

                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;

            } catch (e) { console.error(e); }
        }

        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
