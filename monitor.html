<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄研模型特設サイト</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+JP:wght@900&display=swap');

        body {
            background-color: #ffffff;
            color: #333;
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .admin-link {
            position: absolute;
            top: 15px;
            right: 20px;
            text-decoration: none;
            color: #666;
            border: 1px solid #ccc;
            padding: 5px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            background: #fff;
            z-index: 100;
        }

        .lcd-board {
            width: 95vw;
            max-width: 1000px;
            background: #000;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            margin-top: 60px;
            border: 8px solid #222;
        }

        .lcd-upper-gray {
            background: #333638;
            padding: 15px 25px;
            display: flex;
            align-items: baseline;
            gap: 12px;
            border-bottom: 4px solid #000;
        }
        .lcd-upper-gray .main-jp { font-size: 1.8rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .lcd-upper-gray .sub-en { font-size: 0.9rem; color: #aaa; }

        /* --- LED表示エリア --- */
        .led-display-zone {
            position: relative;
            background: #050505;
            overflow: hidden;
        }

        /* 網目（サイズを5pxに縮小） */
        .led-grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 5px単位の細かいドット網 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 5px 5px;
            z-index: 1;
        }

        /* 文字コンテンツ（最前面） */
        .led-content {
            position: relative;
            z-index: 10; /* 網目(1)より確実に前 */
            width: 100%;
        }

        .lcd-header {
            display: flex;
            background: rgba(30, 30, 30, 0.4);
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .h-col { 
            font-size: 0.85rem; 
            color: #bbb; /* 文字をより明るく */
            text-align: center; 
            font-weight: 900;
        }

        .lcd-main-row {
            display: flex;
            height: 120px;
            align-items: center;
            padding: 0 10px;
        }

        .led-text {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 900;
        }

        .col-type { width: 20%; display: flex; justify-content: center; }
        .type-box { 
            font-size: 2rem; 
            color: #ff9d00; 
            border: 2px solid #ff9d00; 
            padding: 2px 8px;
            background: rgba(0, 0, 0, 0.6);
        }
        
        .col-wait { width: 20%; font-size: 3.5rem; color: #ff9d00; text-align: center; }
        .col-time { width: 20%; font-size: 3.5rem; text-align: center; }
        .col-id   { width: 40%; font-size: 5rem; color: #ffca00; text-align: center; font-family: 'Inter', sans-serif; }

        .time-normal { color: #00ff44; }
        .time-crowded { color: #ff9d00; }
        .time-heavy { color: #ff2200; }

        .lcd-footer {
            height: 55px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-top: 2px solid #222;
        }
        marquee { font-size: 1.8rem; color: #ff9d00; font-weight: 900; }

        .btn-issue {
            margin-top: 50px;
            display: block;
            width: 340px;
            padding: 20px;
            background: #008542;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 4px;
            box-shadow: 0 4px 0 #005a2d;
        }
    </style>
</head>
<body>

    <a href="staff.html" class="admin-link">⚙管理</a>

    <div class="lcd-board">
        <div class="lcd-upper-gray">
            <span class="main-jp">今度の発車は</span>
            <span class="sub-en">Next Train</span>
        </div>

        <div class="led-display-zone">
            <div class="led-grid-bg"></div>

            <div class="led-content">
                <div class="lcd-header">
                    <div class="h-col" style="width: 20%;">種別</div>
                    <div class="h-col" style="width: 20%;">待ち組数</div>
                    <div class="h-col" style="width: 20%;">目安時間</div>
                    <div class="h-col" style="width: 40%;">呼出番号</div>
                </div>

                <div class="lcd-main-row">
                    <div class="col-type"><div class="led-text type-box">体験</div></div>
                    <div class="col-wait led-text"><span id="wait-count">0</span><small style="font-size:1rem; margin-left:4px;">組</small></div>
                    <div class="col-time led-text" id="time-display"><span id="wait-time">0</span><small style="font-size:1rem; margin-left:4px;">分</small></div>
                    <div class="col-id led-text" id="calling-now">---</div>
                </div>

                <div class="lcd-footer">
                    <marquee id="telop-text" scrollamount="10">運行情報を取得中...</marquee>
                </div>
            </div>
        </div>
    </div>

    <a href="entry.html" class="btn-issue">整理券を発行する</a>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const waitList = data.filter(d => d.status === 'resep');
                const count = waitList.length;
                const minutes = count * 5;

                document.getElementById('wait-count').innerText = count;
                document.getElementById('wait-time').innerText = minutes;

                const timeEl = document.getElementById('time-display');
                timeEl.classList.remove('time-normal', 'time-crowded', 'time-heavy');
                if (minutes >= 30) timeEl.classList.add('time-heavy');
                else if (minutes >= 15) timeEl.classList.add('time-crowded');
                else timeEl.classList.add('time-normal');

                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds[callingIds.length - 1] : "---";

                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) document.getElementById('telop-text').innerText = mData.telop;
            } catch (e) { console.error(e); }
        }
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
