<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Monitor - 鉄道研究部</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- モニターヘッダー --- */
        .monitor-header {
            background-color: #333; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #c0392b;
        }
        .system-title { font-size: 1.2rem; font-weight: bold; color: #f1c40f; }

        /* --- メインコンテンツ --- */
        .monitor-container { padding: 20px; }
        
        .btn-staff-login {
            background: #c0392b; color: white; border: none;
            padding: 15px 30px; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
        }

        /* --- パスワード入力用モーダル（隠し画面） --- */
        #login-modal {
            display: none; /* 初期は隠す */
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }

        .login-box {
            background: #1a1a1a; border: 2px solid #f1c40f;
            padding: 40px; border-radius: 8px; text-align: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        .login-box h2 { color: #f1c40f; margin-bottom: 20px; font-size: 1.2rem; }

        .login-box input {
            background: #000; border: 1px solid #444; color: #2ecc71;
            padding: 12px; width: 200px; font-size: 1.2rem; text-align: center;
            margin-bottom: 20px; outline: none;
        }

        .login-box .btn-group { display: flex; gap: 10px; justify-content: center; }

        .btn-auth { background: #2ecc71; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #555; color: #fff; border: none; padding: 10px 20px; cursor: pointer; }

        /* --- 処理中表示（前回の通信中演出） --- */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000;
            z-index: 3000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .loading-text { color: #f1c40f; font-size: 1.5rem; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="monitor-header">
    <div class="system-title">OPERATION CONTROL MONITOR</div>
    <div id="clock">00:00:00</div>
</div>

<div class="monitor-container">
    <h2>Update Schedule</h2>
    <p>スタッフ専用機能を使用するには認証が必要です。</p>
    <button class="btn-staff-login" onclick="openLogin()">STAFF LOGIN / 管理画面へ</button>
</div>

<div id="login-modal">
    <div class="login-box">
        <h2>ENTER ACCESS CODE</h2>
        <input type="password" id="pass-input" placeholder="****" autofocus>
        <div class="btn-group">
            <button class="btn-auth" onclick="checkPassword()">AUTHENTICATE</button>
            <button class="btn-cancel" onclick="closeLogin()">CANCEL</button>
        </div>
        <p id="error-msg" style="color: #e74c3c; margin-top: 15px; font-size: 0.8rem; visibility: hidden;">ACCESS DENIED: INVALID CODE</p>
    </div>
</div>

<div id="loading-overlay">
    <div class="loading-text">COMMUNICATING...</div>
</div>

<script>
    // 時計
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }, 1000);

    // パスワード画面を開く
    function openLogin() {
        document.getElementById('login-modal').style.display = 'flex';
        document.getElementById('pass-input').focus();
    }

    // パスワード画面を閉じる
    function closeLogin() {
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('error-msg').style.visibility = 'hidden';
        document.getElementById('pass-input').value = '';
    }

    // 認証処理
    async function checkPassword() {
        const pass = document.getElementById('pass-input').value;
        const errorMsg = document.getElementById('error-msg');
        
        // パスワード設定（例：1234）
        if (pass === "1234") {
            // 認証成功：処理中アニメーションを表示
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'flex';

            // 演出として少し待機（1.5秒）
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // staff.htmlへ移動
            window.location.href = "staff.html";
        } else {
            // 認証失敗
            errorMsg.style.visibility = 'visible';
            document.getElementById('pass-input').value = '';
        }
    }

    // Enterキーでも送信可能にする
    document.getElementById('pass-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPassword();
    });
</script>

</body>
</html>
