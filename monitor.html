<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運行情報表示器 - Station Monitor</title>
    <style>
        /* 鉄道掲示板風の黒背景 */
        body {
            background-color: #000;
            color: #fff;
            font-family: "MS UI Gothic", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 全体を囲むフレーム */
        .station-board {
            width: 95vw;
            margin: 5vh auto;
            border: 4px solid #444;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 1段目：発車標メインエリア */
        .display-row-top {
            display: flex;
            border-bottom: 3px solid #333;
            height: 150px;
            align-items: center;
            text-align: center;
        }

        /* 各列の定義 */
        .col {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid #333;
        }
        .label {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 5px;
        }
        .value {
            font-weight: bold;
            line-height: 1;
        }

        /* 1列目：待ち組数（緑LED風） */
        .col-wait-count { width: 20%; color: #00ff00; }
        .col-wait-count .value { font-size: 3.5rem; }

        /* 2列目：待ち時間（オレンジLED風） */
        .col-wait-time { width: 25%; color: #ff9900; }
        .col-wait-time .value { font-size: 3.5rem; }

        /* 3列目：呼出番号（赤LED風） */
        .col-calling { width: 55%; color: #ff3300; border-right: none; }
        .col-calling .value { font-size: 4rem; letter-spacing: 5px; }

        /* 2段目：テロップエリア */
        .display-row-bottom {
            height: 80px;
            background: #000;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        marquee {
            font-size: 2.5rem;
            color: #ff9900; /* オレンジ */
            font-weight: bold;
        }

        /* 管理用ボタン（隠し要素風） */
        .admin-trigger {
            position: fixed;
            top: 0;
            right: 0;
            width: 50px;
            height: 50px;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="station-board">
        <div class="display-row-top">
            <div class="col col-wait-count">
                <div class="label">待ち組数</div>
                <div id="wait-count" class="value">0</div>
            </div>
            <div class="col col-wait-time">
                <div class="label">待ち時間(分)</div>
                <div id="wait-time" class="value">約0</div>
            </div>
            <div class="col col-calling">
                <div class="label">ただいまのお呼出し</div>
                <div id="calling-now" class="value">---</div>
            </div>
        </div>

        <div class="display-row-bottom">
            <marquee id="telop-text" scrollamount="10">運行情報を取得中...</marquee>
        </div>
    </div>

    <div class="admin-trigger" ondblclick="location.href='staff.html'"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlzBgQoST_MLC8nvPeJSMQBHnIFouiEB8MI6N2s-oObA0HP-X_txcevkIv8q7UFpfLJQ/exec";

        async function updateMonitor() {
            try {
                // 1. 通常データ（dataシート）取得
                const response = await fetch(API_URL);
                const data = await response.json();

                // 待ち組数：statusが 'resep' のものをカウント
                const waitList = data.filter(d => d.status === 'resep');
                document.getElementById('wait-count').innerText = waitList.length;

                // 待ち時間（計算）：1組あたり5分と仮定（ここはお好みで調整してください）
                const waitMinutes = waitList.length * 5;
                document.getElementById('wait-time').innerText = `約${waitMinutes}`;

                // 呼出番号：statusが 'call' のものを抽出
                const callingIds = data.filter(d => d.status === 'call').map(d => d.id);
                document.getElementById('calling-now').innerText = callingIds.length > 0 ? callingIds.join(' ') : "---";

                // 2. マスターデータ（テロップ）取得
                const mRes = await fetch(API_URL + "?sheet=master");
                const mData = await mRes.json();
                if (mData.telop) {
                    document.getElementById('telop-text').innerText = mData.telop;
                }

            } catch (e) {
                console.error("Monitor Update Error:", e);
            }
        }

        // 10秒おきに更新
        setInterval(updateMonitor, 10000);
        updateMonitor();
    </script>
</body>
</html>
